<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,user-scalable=no,minimum-scale=1.0,maximum-scale=1.0">
<title>ライフゲーム 3D</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="lang-ja">

<div id="hud" class="hud">
  <div id="hud-title">Game of Life 3D</div>
  <div class="hud-row"><label id="lbl-generation">Generation</label><span id="val-generation">0</span></div>
  <div class="hud-row"><label id="lbl-population">Population</label><span id="val-population">0 / 1600</span></div>
  <div class="hud-row"><label id="lbl-speed">Speed</label><input type="range" id="speed-slider"><span id="val-speed"></span></div>
  <div class="hud-row"><label id="lbl-rule">Rule</label><select id="rule-select"><option value="conway">Conway</option><option value="highlife">HighLife</option><option value="daynight">Day &amp; Night</option></select></div>
  <div class="hud-row"><label id="lbl-pixelSize">Pixel Size</label><input type="range" id="pixel-slider"><span id="val-pixelSize"></span></div>
  <div class="hud-row"><label id="lbl-gridSize">Grid Size</label><input type="range" id="grid-slider"><span id="val-gridSize"></span></div>
  <div class="hud-row"><label id="lbl-transition">Transitions</label><span id="transition-badge" style="cursor:pointer">ON</span></div>
  <div class="hud-row"><label id="lbl-lang">Language</label><span id="lang-badge" style="cursor:pointer">EN</span></div>
</div>

<div id="keys-menu">
  <div id="keys-title">Keys</div>
  <div class="key-row"><kbd>Space</kbd><span id="km-playpause">Play / Pause</span></div>
  <div class="key-row"><kbd>N</kbd><span id="km-step">Step</span></div>
  <div class="key-row"><kbd>R</kbd><span id="km-random">Random</span></div>
  <div class="key-row"><kbd>C</kbd><span id="km-clear">Clear</span></div>
  <div class="key-row"><kbd>L</kbd><span id="km-light">Toggle Light</span></div>
  <div class="key-row"><kbd>P</kbd><span id="km-reset">Reset Camera</span></div>
  <div class="key-row"><kbd>T</kbd><span id="km-top">Top View</span></div>
  <div class="key-row"><kbd>J</kbd><span id="km-lang">Language</span></div>
  <div class="key-row"><kbd>1/2/3</kbd><span id="km-rules">Switch Rule</span></div>
  <div class="key-row"><kbd>Ctrl+Z</kbd><span id="km-undo">Undo</span></div>
</div>

<div id="minimap-wrap">
  <div id="minimap-label">Minimap</div>
  <canvas id="minimap" width="140" height="140"></canvas>
</div>

<div id="compass-wrap">
  <canvas id="compass-canvas" width="80" height="80"></canvas>
</div>

<script type="importmap">
{
  "imports":{
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
